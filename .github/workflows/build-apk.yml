name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_mecanica
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Crear google-services.json
        working-directory: .
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app_mecanica/android/app/google-services.json

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK
        run: flutter build apk --release

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app_mecanica/build/app/outputs/flutter-apk/app-release.apk
